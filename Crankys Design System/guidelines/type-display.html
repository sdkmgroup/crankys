<!-- @dsCard group="Type" viewport="700x300" name="Headlines — Newsreader serif" subtitle="Editorial serif for display & headings · warm, characterful" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  body { margin:0; padding:26px 28px; background:var(--color-surface); }
  .specimen { font-family:var(--font-serif); color:var(--text-heading); letter-spacing:var(--ls-tight); line-height:1.05; }
  .d { font-size:56px; font-weight:600; margin:0; }
  .h1 { font-size:40px; font-weight:600; margin:.35em 0 0; }
  .h2 { font-size:30px; font-weight:600; margin:.45em 0 0; }
  .it { font-style:italic; color:var(--color-primary-strong); }
  .meta { font-family:var(--font-sans); font-size:12.5px; color:var(--text-muted); margin-top:18px; line-height:1.6; }
  .meta b { color:var(--text-strong); }
</style></head><body>
<div class="specimen">
  <p class="d">Every animal<br/>deserves <span class="it">kindness</span></p>
  <p class="h2">Stories from the farm</p>
</div>
<div class="meta">
  <b>Newsreader</b> &nbsp;—&nbsp; weights 400 / 500 / 600 · upright & italic &nbsp;·&nbsp; tracking −0.02em<br/>
  Roles: <b>--fs-display</b> (hero) · <b>--fs-h1 / h2 / h3</b> (section & card titles). Italic for warmth and emphasis.
</div>
</body></html>
