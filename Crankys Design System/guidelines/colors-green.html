<!-- @dsCard group="Colors" viewport="700x180" name="Meadow green — primary" subtitle="The hero brand colour, refined from the original lime" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  body { margin:0; padding:22px 24px; background:var(--color-surface); font-family:var(--font-sans); }
  .scale { display:flex; gap:0; border-radius:var(--radius-md); overflow:hidden; box-shadow:var(--shadow-sm); }
  .sw { flex:1; height:96px; display:flex; align-items:flex-end; padding:8px; box-sizing:border-box; }
  .sw span { font-size:11px; font-weight:700; letter-spacing:.02em; }
  .meta { display:flex; justify-content:space-between; margin-top:10px; font-size:12px; color:var(--text-muted); }
  .meta b { color:var(--text-strong); font-family:var(--font-serif); font-weight:600; }
</style></head><body>
<div class="scale">
  <div class="sw" style="background:var(--green-50)"><span style="color:var(--green-800)">50</span></div>
  <div class="sw" style="background:var(--green-100)"><span style="color:var(--green-800)">100</span></div>
  <div class="sw" style="background:var(--green-200)"><span style="color:var(--green-800)">200</span></div>
  <div class="sw" style="background:var(--green-300)"><span style="color:var(--green-900)">300</span></div>
  <div class="sw" style="background:var(--green-400)"><span style="color:#fff">400</span></div>
  <div class="sw" style="background:var(--green-500)"><span style="color:#fff">500</span></div>
  <div class="sw" style="background:var(--green-600)"><span style="color:#fff">600</span></div>
  <div class="sw" style="background:var(--green-700)"><span style="color:#fff">700</span></div>
  <div class="sw" style="background:var(--green-800)"><span style="color:#fff">800</span></div>
  <div class="sw" style="background:var(--green-900)"><span style="color:#fff">900</span></div>
</div>
<div class="meta"><span><b>--green-500</b> &nbsp;#7aa63f &nbsp;·&nbsp; core brand · CTAs, accents, nav band</span><span>--green-700 for headings & contrast</span></div>
</body></html>
