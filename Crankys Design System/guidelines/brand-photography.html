<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  body { margin:0; padding:22px 24px; background:var(--color-surface); font-family:var(--font-sans); }
  .row { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
  .ph { border-radius:var(--radius-md); overflow:hidden; aspect-ratio:3/4; box-shadow:var(--shadow-sm); position:relative; }
  .ph img { width:100%; height:100%; object-fit:cover; display:block; }
  .tag { position:absolute; left:8px; bottom:8px; background:rgba(33,31,26,.62); color:#fff; font-size:10.5px; font-weight:700; padding:3px 8px; border-radius:var(--radius-pill); backdrop-filter:blur(2px); }
  .meta { font-size:12.5px; color:var(--text-muted); margin-top:14px; line-height:1.6; }
  .meta b { color:var(--text-strong); }
</style></head><body>
<div class="row">
  <div class="ph"><img src="../assets/images/bunny.png" alt="Bunny the goat"/><span class="tag">Bunny</span></div>
  <div class="ph"><img src="../assets/images/lilah.png" alt="Lilah the goat"/><span class="tag">Lilah</span></div>
  <div class="ph"><img src="../assets/images/gloria.png" alt="Gloria's coop at sunset"/><span class="tag">Gloria</span></div>
  <div class="ph"><img src="../assets/images/cranky-portrait.png" alt="Cranky in black and white" style="filter:grayscale(1) contrast(1.05)"/><span class="tag">Cranky · B&amp;W</span></div>
</div>
<p class="meta"><b>Treatment:</b> the charity's own photos — warm, candid, eye-level with the animal. Rounded corners (--radius-md/lg), soft shadow. Reserve <b>black &amp; white</b> for memorial / origin stories (e.g. Cranky). Avoid stock; faces and eyes carry the emotion.</p>
</body></html>
