<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  body { margin:0; padding:24px 28px; background:var(--color-surface); font-family:var(--font-sans); }
  .r { display:flex; align-items:center; gap:14px; margin-bottom:9px; }
  .bar { background:var(--green-300); height:16px; border-radius:4px; }
  .tok { font-size:12px; color:var(--text-muted); width:170px; }
  .tok b { color:var(--text-strong); font-weight:700; }
</style></head><body>
  <div class="r"><div class="bar" style="width:4px"></div><div class="tok"><b>--space-1</b> · 4px</div></div>
  <div class="r"><div class="bar" style="width:8px"></div><div class="tok"><b>--space-2</b> · 8px</div></div>
  <div class="r"><div class="bar" style="width:12px"></div><div class="tok"><b>--space-3</b> · 12px</div></div>
  <div class="r"><div class="bar" style="width:16px"></div><div class="tok"><b>--space-4</b> · 16px</div></div>
  <div class="r"><div class="bar" style="width:24px"></div><div class="tok"><b>--space-5</b> · 24px</div></div>
  <div class="r"><div class="bar" style="width:32px"></div><div class="tok"><b>--space-6</b> · 32px</div></div>
  <div class="r"><div class="bar" style="width:48px"></div><div class="tok"><b>--space-7</b> · 48px</div></div>
  <div class="r"><div class="bar" style="width:64px"></div><div class="tok"><b>--space-8</b> · 64px</div></div>
  <div class="r"><div class="bar" style="width:96px"></div><div class="tok"><b>--space-9</b> · 96px</div></div>
</body></html>
