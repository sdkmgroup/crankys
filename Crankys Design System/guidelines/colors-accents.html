<!-- @dsCard group="Colors" viewport="700x230" name="Accents — clay & raspberry" subtitle="Warm clay for emphasis · raspberry carries the Donate action" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  body { margin:0; padding:22px 24px; background:var(--color-surface); font-family:var(--font-sans); }
  .row { margin-bottom:18px; }
  .lab { font-size:12px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--text-muted); margin-bottom:8px; }
  .scale { display:flex; gap:0; border-radius:var(--radius-sm); overflow:hidden; box-shadow:var(--shadow-xs); }
  .sw { flex:1; height:60px; display:flex; align-items:flex-end; padding:6px; box-sizing:border-box; }
  .sw span { font-size:10px; font-weight:700; }
</style></head><body>
<div class="row">
  <div class="lab">Clay — warm secondary &nbsp;·&nbsp; --clay-500 #c06a3e</div>
  <div class="scale">
    <div class="sw" style="background:var(--clay-100)"><span style="color:var(--clay-600)">100</span></div>
    <div class="sw" style="background:var(--clay-200)"><span style="color:var(--clay-600)">200</span></div>
    <div class="sw" style="background:var(--clay-300)"><span style="color:#fff">300</span></div>
    <div class="sw" style="background:var(--clay-400)"><span style="color:#fff">400</span></div>
    <div class="sw" style="background:var(--clay-500)"><span style="color:#fff">500</span></div>
    <div class="sw" style="background:var(--clay-600)"><span style="color:#fff">600</span></div>
  </div>
</div>
<div class="row">
  <div class="lab">Raspberry — the Donate / give action &nbsp;·&nbsp; --berry-500 #d1467e</div>
  <div class="scale">
    <div class="sw" style="background:var(--berry-100)"><span style="color:var(--berry-700)">100</span></div>
    <div class="sw" style="background:var(--berry-200)"><span style="color:var(--berry-700)">200</span></div>
    <div class="sw" style="background:var(--berry-300)"><span style="color:#fff">300</span></div>
    <div class="sw" style="background:var(--berry-400)"><span style="color:#fff">400</span></div>
    <div class="sw" style="background:var(--berry-500)"><span style="color:#fff">500</span></div>
    <div class="sw" style="background:var(--berry-600)"><span style="color:#fff">600</span></div>
    <div class="sw" style="background:var(--berry-700)"><span style="color:#fff">700</span></div>
  </div>
</div>
<div class="row" style="margin-bottom:0">
  <div class="lab">Sunshine — sparing highlight only &nbsp;·&nbsp; --sun-400 #f1b73f</div>
  <div class="scale">
    <div class="sw" style="background:var(--sun-300)"><span style="color:#7a5500">300</span></div>
    <div class="sw" style="background:var(--sun-400)"><span style="color:#7a5500">400</span></div>
    <div class="sw" style="background:var(--sun-500)"><span style="color:#fff">500</span></div>
  </div>
</div>
</body></html>
